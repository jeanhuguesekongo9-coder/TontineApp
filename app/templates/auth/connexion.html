{% extends "base.html" %}
{% block title %}Connexion – TontineSecure{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto;" class="fade-in">
  <div style="text-align:center;margin-bottom:2rem;">
    <h1 style="font-family:Playfair Display,serif;font-size:2rem;color:#1a1a2e;">Bienvenue</h1>
    <p style="color:#6c757d;">Connectez-vous a votre espace TontineSecure</p>
  </div>
  <div class="card">
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control form-control-lg" placeholder="votre@email.com" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mot de passe</label>
          <input type="password" name="mot_de_passe" class="form-control form-control-lg" placeholder="••••••••" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <label style="display:flex;align-items:center;gap:6px;font-size:0.88rem;cursor:pointer;">
            <input type="checkbox" name="souvenir" style="accent-color:#f0a500;"> Se souvenir de moi
          </label>
        </div>
        <button type="submit" class="btn-or w-100" style="padding:0.85rem;font-size:1rem;">Se connecter</button>
      </form>
      <hr style="margin:1.5rem 0;">
      <p style="text-align:center;font-size:0.88rem;color:#6c757d;margin:0;">
        Pas encore de compte ? <a href="{{ url_for('auth.inscription') }}" style="color:#f0a500;font-weight:600;">S inscrire</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
