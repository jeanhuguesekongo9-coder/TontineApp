{% extends "base.html" %}
{% block title %}Inscription – TontineSecure{% endblock %}
{% block content %}
<div style="max-width:480px;margin:3rem auto;" class="fade-in">
  <div style="text-align:center;margin-bottom:2rem;">
    <h1 style="font-family:Playfair Display,serif;font-size:2rem;color:#1a1a2e;">Creer un compte</h1>
    <p style="color:#6c757d;">Rejoignez TontineSecure en quelques minutes</p>
  </div>
  <div class="card">
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Adresse email <span style="color:#e74c3c;">*</span></label>
          <input type="email" name="email" class="form-control form-control-lg" placeholder="votre@email.com" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mot de passe <span style="color:#e74c3c;">*</span></label>
          <input type="password" name="mot_de_passe" id="mdp" class="form-control form-control-lg" placeholder="Minimum 8 caracteres" required minlength="8">
          <div id="force-mdp" style="height:4px;border-radius:2px;background:#dee2e6;margin-top:6px;transition:all 0.3s;"></div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirmer le mot de passe <span style="color:#e74c3c;">*</span></label>
          <input type="password" name="confirmer_mdp" class="form-control form-control-lg" placeholder="Repetez le mot de passe" required>
        </div>
        <button type="submit" class="btn-or w-100" style="padding:0.85rem;font-size:1rem;">Creer mon compte</button>
      </form>
      <hr style="margin:1.5rem 0;">
      <p style="text-align:center;font-size:0.88rem;color:#6c757d;margin:0;">
        Deja inscrit ? <a href="{{ url_for('auth.connexion') }}" style="color:#f0a500;font-weight:600;">Se connecter</a>
      </p>
    </div>
  </div>
</div>
<script>
document.getElementById('mdp').addEventListener('input', function() {
  var v = this.value, score = 0, bar = document.getElementById('force-mdp');
  if(v.length >= 8) score++;
  if(/[A-Z]/.test(v)) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  var colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71'];
  bar.style.width = (score*25)+'%';
  bar.style.background = colors[score-1] || '#dee2e6';
});
</script>
{% endblock %}
